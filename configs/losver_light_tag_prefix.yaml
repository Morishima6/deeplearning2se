model_name: Qwen/Qwen2.5-Coder-1.5B
text_field: text_tag_prefix
train_file: /mnt/sda/gzx/data/deeplearning2se/processed/devign_losver/train.jsonl
valid_file: /mnt/sda/gzx/data/deeplearning2se/processed/devign_losver/valid.jsonl
test_file: /mnt/sda/gzx/data/deeplearning2se/processed/devign_losver/test.jsonl
output_dir: /mnt/sda/gzx/models/deeplearning2se/outputs/run_losver_prefix_seed{seed}
max_length: 512

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.05
  logging_steps: 25
  fp16: true
